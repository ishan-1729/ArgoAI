apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-nonexistent-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nonexistent-storage-class
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-storage-issue
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-storage-issue
  template:
    metadata:
      labels:
        app: demo-storage-issue
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for PVC to bind..."
              sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-nonexistent-pvc
