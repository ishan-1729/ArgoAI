apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-missing-config
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-missing-config
  template:
    metadata:
      labels:
        app: demo-missing-config
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          envFrom:
            - configMapRef:
                name: nonexistent-config-map
