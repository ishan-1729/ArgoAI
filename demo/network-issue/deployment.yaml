apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-network-issue
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-network-issue
  template:
    metadata:
      labels:
        app: demo-network-issue
    spec:
      containers:
        - name: curl-loop
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                echo "Simulating app process; no listener is exposed on port 8080"
                sleep 5
              done
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
