apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-restricted-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-rbac-issue
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: demo-rbac-issue
  template:
    metadata:
      labels:
        app: demo-rbac-issue
    spec:
      serviceAccountName: demo-restricted-sa
      containers:
        - name: rbac-check
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              echo "Attempting to list secrets with restricted service account..."
              curl -sS --cacert "$CACERT" \
                -H "Authorization: Bearer $TOKEN" \
                https://kubernetes.default.svc/api/v1/namespaces/default/secrets
              echo ""
              echo "Expected RBAC forbidden response received; exiting to preserve logs."
              exit 1
