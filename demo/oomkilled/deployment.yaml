apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-oomkilled
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-oomkilled
  template:
    metadata:
      labels:
        app: demo-oomkilled
    spec:
      containers:
        - name: stress
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Allocating memory beyond the 64Mi container limit..."
              x="$(head -c 256M /dev/zero | tr '\000' 'A')"
              echo "Allocated ${#x} bytes"
              sleep 3600
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
